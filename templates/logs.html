{% extends "base.html" %}
{% block content %}
<h2 class="mt-3"><i class="bi bi-journal-text"></i> 审计日志</h2>

<form method="get" class="row g-2 mt-3">
    <div class="col-md-4"><input type="text" name="keyword" class="form-control" placeholder="用户名/动作/详情" value="{{ keyword }}"></div>
    <div class="col-md-2"><button class="btn btn-primary">查询</button></div>
</form>

<table class="table table-sm mt-3">
    <thead><tr><th>用户名</th><th>动作</th><th>详情</th><th>时间</th></tr></thead>
    <tbody>
        {% for l in logs %}
        <tr><td>{{ l.username }}</td><td>{{ l.action }}</td><td>{{ l.detail }}</td><td>{{ l.created_at }}</td></tr>
        {% endfor %}
    </tbody>
</table>
{% include '_pagination.html' %}
{% endblock %}
