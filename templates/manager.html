<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>药房管理员端</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <h2>药房管理员</h2>
        <p>欢迎：{{ user.real_name }}</p>
        <ul>
            <li onclick="showTab('dashboard')">首页概览</li>
            <li onclick="showTab('drugManage')">药品管理</li>
            <li onclick="showTab('categoryManage')">分类管理</li>
            <li onclick="showTab('stockInManage')">入库管理</li>
            <li onclick="showTab('inventorySummary')">库存汇总</li>
            <li onclick="showTab('suggestionManage')">药品意见审批</li>
        </ul>
        <a class="logout-btn" href="/api/logout">退出登录</a>
    </aside>

    <main class="main">
        <section id="dashboard" class="tab active">
            <h2>门店概览</h2>
            <div class="cards" id="dashboardCards"></div>
        </section>

        <section id="drugManage" class="tab">
            <h2>药品管理</h2>
            <div class="toolbar">
                <input id="drugKeyword" placeholder="输入药品名/编码/厂商">
                <button class="btn primary" onclick="loadDrugs()">搜索</button>
                <button class="btn success" onclick="openDrugModal()">新增药品</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>编码</th>
                        <th>名称</th>
                        <th>厂商</th>
                        <th>分类</th>
                        <th>规格</th>
                        <th>单位</th>
                        <th>单价</th>
                        <th>处方药</th>
                        <th>库存</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="drugTableBody"></tbody>
            </table>
        </section>

        <section id="categoryManage" class="tab">
            <h2>分类管理</h2>
            <div class="toolbar">
                <input id="categoryName" placeholder="分类名称">
                <input id="categoryDesc" placeholder="分类描述">
                <button class="btn primary" onclick="addCategory()">新增分类</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>分类名称</th>
                        <th>描述</th>
                    </tr>
                </thead>
                <tbody id="categoryTableBody"></tbody>
            </table>
        </section>

        <section id="stockInManage" class="tab">
            <h2>入库管理</h2>
            <div class="toolbar">
                <button class="btn primary" onclick="openStockInModal()">新增入库</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>药品编码</th>
                        <th>药品名称</th>
                        <th>批次号</th>
                        <th>数量</th>
                        <th>进价</th>
                        <th>供应商</th>
                        <th>操作人</th>
                        <th>时间</th>
                        <th>备注</th>
                    </tr>
                </thead>
                <tbody id="stockInTableBody"></tbody>
            </table>
        </section>

        <section id="inventorySummary" class="tab">
            <h2>库存汇总</h2>
            <div class="toolbar">
                <button class="btn primary" onclick="loadInventory()">刷新库存</button>
                <button class="btn warning" onclick="loadLowStock()">查看低库存预警</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>编码</th>
                        <th>名称</th>
                        <th>分类</th>
                        <th>规格</th>
                        <th>单位</th>
                        <th>价格</th>
                        <th>库存</th>
                        <th>预警值</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="inventoryTableBody"></tbody>
            </table>
        </section>

        <section id="suggestionManage" class="tab">
            <h2>药品意见审批 <span id="unreadBadge" class="badge"></span></h2>
            <div class="toolbar">
                <select id="suggestionStatus" onchange="loadSuggestions()">
                    <option value="">全部状态</option>
                    <option value="待审批">待审批</option>
                    <option value="已通过">已通过</option>
                    <option value="已驳回">已驳回</option>
                </select>
                <button class="btn success" onclick="batchApprove()">批量通过</button>
                <button class="btn danger" onclick="batchReject()">批量驳回</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th><input type="checkbox" onclick="toggleAllSuggestions(this)"></th>
                        <th>ID</th>
                        <th>药品名称</th>
                        <th>类型</th>
                        <th>数量</th>
                        <th>预估价格</th>
                        <th>提交人</th>
                        <th>状态</th>
                        <th>提交时间</th>
                        <th>原因</th>
                        <th>审批意见</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="suggestionTableBody"></tbody>
            </table>
        </section>
    </main>
</div>

<div class="modal" id="drugModal">
    <div class="modal-content">
        <h3 id="drugModalTitle">新增药品</h3>
        <input type="hidden" id="d_id">
        <div class="form-item"><label>药品编码</label><input id="d_code"></div>
        <div class="form-item"><label>药品名称</label><input id="d_name"></div>
        <div class="form-item"><label>生产厂商</label><input id="d_manufacturer"></div>
        <div class="form-item"><label>规格</label><input id="d_specification"></div>
        <div class="form-item"><label>单位</label><input id="d_unit"></div>
        <div class="form-item"><label>价格</label><input id="d_price" type="number"></div>
        <div class="form-item"><label>初始库存</label><input id="d_init_stock" type="number" value="0"></div>
        <div class="form-item">
            <label>分类</label>
            <select id="d_category"></select>
        </div>
        <div class="form-item">
            <label>是否处方药</label>
            <select id="d_prescription">
                <option value="false">否</option>
                <option value="true">是</option>
            </select>
        </div>
        <div class="modal-actions">
            <button class="btn primary" onclick="saveDrug()">保存</button>
            <button class="btn" onclick="closeModal('drugModal')">取消</button>
        </div>
    </div>
</div>

<div class="modal" id="stockInModal">
    <div class="modal-content">
        <h3>新增入库</h3>
        <div class="form-item">
            <label>药品</label>
            <select id="si_drug_id"></select>
        </div>
        <div class="form-item"><label>批次号</label><input id="si_batch_no"></div>
        <div class="form-item"><label>数量</label><input id="si_quantity" type="number"></div>
        <div class="form-item"><label>进价</label><input id="si_price" type="number"></div>
        <div class="form-item"><label>供应商</label><input id="si_supplier"></div>
        <div class="form-item"><label>备注</label><input id="si_remark"></div>
        <div class="modal-actions">
            <button class="btn primary" onclick="saveStockIn()">保存</button>
            <button class="btn" onclick="closeModal('stockInModal')">取消</button>
        </div>
    </div>
</div>

<script src="/static/app.js"></script>
<script>
async function loadDashboard() {
    const res = await fetch('/api/dashboard');
    const data = await res.json();
    const d = data.data;
    document.getElementById('dashboardCards').innerHTML = `
        <div class="card"><h3>药品总数</h3><p>${d.drug_count}</p></div>
        <div class="card"><h3>系统用户数</h3><p>${d.user_count}</p></div>
        <div class="card"><h3>今日销售额</h3><p>￥${d.today_sales}</p></div>
        <div class="card"><h3>低库存药品</h3><p>${d.low_stock}</p></div>
        <div class="card"><h3>待审批意见</h3><p>${d.pending_suggestions}</p></div>
    `;
}

function showTab(tabId) {
    document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    if (tabId === 'dashboard') loadDashboard();
    if (tabId === 'drugManage') loadDrugs();
    if (tabId === 'categoryManage') loadCategories();
    if (tabId === 'stockInManage') loadStockIn();
    if (tabId === 'inventorySummary') loadInventory();
    if (tabId === 'suggestionManage') {
        loadSuggestions();
        loadUnreadCount();
    }
}

async function initCategories() {
    const res = await fetch('/api/categories');
    const data = await res.json();
    const select = document.getElementById('d_category');
    const table = document.getElementById('categoryTableBody');
    select.innerHTML = '';
    table.innerHTML = '';
    data.data.forEach(c => {
        select.innerHTML += `<option value="${c.id}">${c.category_name}</option>`;
        table.innerHTML += `<tr><td>${c.id}</td><td>${c.category_name}</td><td>${c.description || ''}</td></tr>`;
    });
}

async function loadCategories() {
    await initCategories();
}

async function loadDrugs() {
    const keyword = document.getElementById('drugKeyword').value || '';
    const res = await fetch('/api/drugs?keyword=' + encodeURIComponent(keyword));
    const data = await res.json();
    const tbody = document.getElementById('drugTableBody');
    const select = document.getElementById('si_drug_id');
    tbody.innerHTML = '';
    select.innerHTML = '';
    data.data.forEach(d => {
        tbody.innerHTML += `
            <tr>
                <td>${d.id}</td>
                <td>${d.drug_code}</td>
                <td>${d.drug_name}</td>
                <td>${d.manufacturer || ''}</td>
                <td>${d.category_name || ''}</td>
                <td>${d.specification || ''}</td>
                <td>${d.unit || ''}</td>
                <td>${d.price}</td>
                <td>${d.is_prescription ? '是' : '否'}</td>
                <td>${d.stock}</td>
                <td>
                    <button class="btn small warning" onclick='editDrug(${JSON.stringify(d)})'>编辑</button>
                    <button class="btn small danger" onclick='deleteDrug(${d.id})'>删除</button>
                </td>
            </tr>
        `;
        select.innerHTML += `<option value="${d.id}">${d.drug_name}（${d.drug_code}）</option>`;
    });
}

function openDrugModal() {
    document.getElementById('drugModalTitle').innerText = '新增药品';
    document.getElementById('d_id').value = '';
    document.getElementById('d_code').disabled = false;
    ['d_code','d_name','d_manufacturer','d_specification','d_unit','d_price'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('d_init_stock').value = 0;
    document.getElementById('d_prescription').value = 'false';
    document.getElementById('drugModal').style.display = 'flex';
}

function editDrug(d) {
    document.getElementById('drugModalTitle').innerText = '编辑药品';
    document.getElementById('d_id').value = d.id;
    document.getElementById('d_code').value = d.drug_code;
    document.getElementById('d_code').disabled = true;
    document.getElementById('d_name').value = d.drug_name || '';
    document.getElementById('d_manufacturer').value = d.manufacturer || '';
    document.getElementById('d_specification').value = d.specification || '';
    document.getElementById('d_unit').value = d.unit || '';
    document.getElementById('d_price').value = d.price || 0;
    document.getElementById('d_init_stock').value = d.stock || 0;
    document.getElementById('d_category').value = d.category_id;
    document.getElementById('d_prescription').value = d.is_prescription ? 'true' : 'false';
    document.getElementById('drugModal').style.display = 'flex';
}

async function saveDrug() {
    const id = document.getElementById('d_id').value;
    const payload = {
        drug_code: document.getElementById('d_code').value,
        drug_name: document.getElementById('d_name').value,
        manufacturer: document.getElementById('d_manufacturer').value,
        category_id: parseInt(document.getElementById('d_category').value),
        specification: document.getElementById('d_specification').value,
        unit: document.getElementById('d_unit').value,
        price: parseFloat(document.getElementById('d_price').value || 0),
        init_stock: parseInt(document.getElementById('d_init_stock').value || 0),
        is_prescription: document.getElementById('d_prescription').value === 'true'
    };

    let url = '/api/drugs/add';
    if (id) {
        url = '/api/drugs/update';
        payload.id = parseInt(id);
    }

    const res = await fetch(url, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
    });
    const data = await res.json();
    alert(data.msg);
    if (data.code === 200) {
        closeModal('drugModal');
        loadDrugs();
        loadInventory();
    }
}

async function deleteDrug(id) {
    if (!confirm('确定删除该药品吗？')) return;
    const res = await fetch(`/api/drugs/delete/${id}`, {method: 'POST'});
    const data = await res.json();
    alert(data.msg);
    loadDrugs();
    loadInventory();
}

async function addCategory() {
    const category_name = document.getElementById('categoryName').value.trim();
    const description = document.getElementById('categoryDesc').value.trim();
    if (!category_name) return alert('请输入分类名称');

    const res = await fetch('/api/categories/add', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({category_name, description})
    });
    const data = await res.json();
    alert(data.msg);
    if (data.code === 200) {
        document.getElementById('categoryName').value = '';
        document.getElementById('categoryDesc').value = '';
        loadCategories();
    }
}

function openStockInModal() {
    document.getElementById('si_batch_no').value = '';
    document.getElementById('si_quantity').value = '';
    document.getElementById('si_price').value = '';
    document.getElementById('si_supplier').value = '';
    document.getElementById('si_remark').value = '';
    document.getElementById('stockInModal').style.display = 'flex';
}

async function saveStockIn() {
    const payload = {
        drug_id: parseInt(document.getElementById('si_drug_id').value),
        batch_no: document.getElementById('si_batch_no').value,
        quantity: parseInt(document.getElementById('si_quantity').value || 0),
        purchase_price: parseFloat(document.getElementById('si_price').value || 0),
        supplier: document.getElementById('si_supplier').value,
        remark: document.getElementById('si_remark').value
    };

    const res = await fetch('/api/stockin/add', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
    });
    const data = await res.json();
    alert(data.msg);
    if (data.code === 200) {
        closeModal('stockInModal');
        loadStockIn();
        loadInventory();
        loadDrugs();
    }
}

async function loadStockIn() {
    const res = await fetch('/api/stockin');
    const data = await res.json();
    const tbody = document.getElementById('stockInTableBody');
    tbody.innerHTML = '';
    data.data.forEach(r => {
        tbody.innerHTML += `
            <tr>
                <td>${r.id}</td>
                <td>${r.drug_code}</td>
                <td>${r.drug_name}</td>
                <td>${r.batch_no || ''}</td>
                <td>${r.quantity}</td>
                <td>${r.purchase_price || ''}</td>
                <td>${r.supplier || ''}</td>
                <td>${r.operator_name || ''}</td>
                <td>${formatTime(r.created_at)}</td>
                <td>${r.remark || ''}</td>
            </tr>
        `;
    });
}

async function loadInventory() {
    const res = await fetch('/api/inventory');
    const data = await res.json();
    const tbody = document.getElementById('inventoryTableBody');
    tbody.innerHTML = '';
    data.data.forEach(i => {
        tbody.innerHTML += `
            <tr>
                <td>${i.drug_code}</td>
                <td>${i.drug_name}</td>
                <td>${i.category_name || ''}</td>
                <td>${i.specification || ''}</td>
                <td>${i.unit || ''}</td>
                <td>${i.price}</td>
                <td>${i.stock}</td>
                <td>${i.min_stock}</td>
                <td class="${i.status === '库存不足' ? 'danger-text' : 'success-text'}">${i.status}</td>
            </tr>
        `;
    });
}

async function loadLowStock() {
    const res = await fetch('/api/lowstock');
    const data = await res.json();
    if (!data.data.length) {
        alert('当前没有低库存药品');
        return;
    }
    let msg = '低库存预警：\n';
    data.data.forEach(item => {
        msg += `${item.drug_name}（当前:${item.stock} / 预警:${item.min_stock}）\n`;
    });
    alert(msg);
}

async function loadUnreadCount() {
    const res = await fetch('/api/suggestions/unread');
    const data = await res.json();
    document.getElementById('unreadBadge').innerText = `未读 ${data.data.count}`;
}

async function loadSuggestions() {
    const status = document.getElementById('suggestionStatus').value;
    const res = await fetch('/api/suggestions?status=' + encodeURIComponent(status));
    const data = await res.json();
    const tbody = document.getElementById('suggestionTableBody');
    tbody.innerHTML = '';
    data.data.forEach(s => {
        tbody.innerHTML += `
            <tr>
                <td><input type="checkbox" class="sug-check" value="${s.id}"></td>
                <td>${s.id}</td>
                <td>${s.drug_name}</td>
                <td>${s.drug_type || ''}</td>
                <td>${s.quantity || ''}</td>
                <td>${s.estimated_price || ''}</td>
                <td>${s.submitter_name || ''}</td>
                <td>${s.status}</td>
                <td>${formatTime(s.created_at)}</td>
                <td>${s.reason || ''}</td>
                <td>${s.admin_comment || ''}</td>
                <td>
                    ${s.status === '待审批' ? `
                        <button class="btn small success" onclick="reviewSuggestion(${s.id}, 'approve')">通过</button>
                        <button class="btn small danger" onclick="reviewSuggestion(${s.id}, 'reject')">驳回</button>
                    ` : '已处理'}
                </td>
            </tr>
        `;
    });
}

async function reviewSuggestion(id, action) {
    let comment = '';
    if (action === 'reject') {
        comment = prompt('请输入驳回原因：');
        if (!comment) return;
    }
    const res = await fetch('/api/suggestions/review', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({id, action, comment})
    });
    const data = await res.json();
    alert(data.msg);
    loadSuggestions();
    loadUnreadCount();
}

function getSelectedSuggestionIds() {
    return Array.from(document.querySelectorAll('.sug-check:checked')).map(x => parseInt(x.value));
}

function toggleAllSuggestions(el) {
    document.querySelectorAll('.sug-check').forEach(c => c.checked = el.checked);
}

async function batchApprove() {
    const ids = getSelectedSuggestionIds();
    if (!ids.length) return alert('请先选择记录');
    const res = await fetch('/api/suggestions/batch_review', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ids, action: 'approve'})
    });
    const data = await res.json();
    alert(data.msg);
    loadSuggestions();
    loadUnreadCount();
}

async function batchReject() {
    const ids = getSelectedSuggestionIds();
    if (!ids.length) return alert('请先选择记录');
    const comment = prompt('请输入批量驳回原因：');
    if (!comment) return;
    const res = await fetch('/api/suggestions/batch_review', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ids, action: 'reject', comment})
    });
    const data = await res.json();
    alert(data.msg);
    loadSuggestions();
    loadUnreadCount();
}

initCategories();
loadDashboard();
loadDrugs();
</script>
</body>
</html>
